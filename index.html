<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="index.css">
</head>
<body>

<div class="device">
  <div class="brand">
    <span class="name">StopWatch</span>
    <span class="status" id="statusIndicator"><span class="dot"></span><span id="statusText">Ready</span></span>
  </div>

  <div class="dial-wrap">
    <svg viewBox="0 0 320 320">
      <circle cx="160" cy="160" r="150" fill="none" stroke="var(--hairline)" stroke-width="1"></circle>
      <g id="ticks"></g>
      <line id="sweepHand" class="sweep" x1="160" y1="160" x2="160" y2="30"></line>
      <circle class="hub" cx="160" cy="160" r="4"></circle>
    </svg>
    <div class="readout">
      <div class="time"><span id="timeMain">00:00</span><span class="ms" id="timeMs">.00</span></div>
      <div class="label" id="dialLabel">Elapsed</div>
    </div>
  </div>

  <div class="controls">
    <button id="startPauseBtn">Start</button>
    <button id="lapBtn" disabled>Lap</button>
    <button id="resetBtn" disabled>Reset</button>
  </div>

  <div class="laps">
    <div class="laps-header">
      <span>Laps</span>
      <span id="lapCount">0</span>
    </div>
    <ul class="lap-list" id="lapList">
      <li class="empty-state" id="emptyState">No laps recorded yet</li>
    </ul>
  </div>
</div>

<script src="index.js"></script>
</body>
</html>
